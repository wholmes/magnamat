services:
  db:
    image: postgres:16-alpine
    ports:
      # Host port: override if 5434 is taken (`POSTGRES_HOST_PORT=55434` in `.env` next to this file)
      - '${POSTGRES_HOST_PORT:-5434}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: magnamat
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d magnamat']
      interval: 3s
      timeout: 3s
      retries: 15
